syntax = "proto3";

package virtui.v1;

option go_package = "github.com/rotemtam/virtui/proto/virtui/v1;virtuipb";

service VirtuiService {
  rpc Run(RunRequest) returns (RunResponse);
  rpc Kill(KillRequest) returns (KillResponse);
  rpc Sessions(SessionsRequest) returns (SessionsResponse);
  rpc Resize(ResizeRequest) returns (ResizeResponse);
  rpc Exec(ExecRequest) returns (ExecResponse);
  rpc Screenshot(ScreenshotRequest) returns (ScreenshotResponse);
  rpc Press(PressRequest) returns (PressResponse);
  rpc Type(TypeRequest) returns (TypeResponse);
  rpc Wait(WaitRequest) returns (WaitResponse);
  rpc Pipeline(PipelineRequest) returns (PipelineResponse);
  rpc Watch(WatchRequest) returns (stream WatchEvent);
}

// --- Run ---

message RunRequest {
  repeated string command = 1;
  uint32 cols = 2;
  uint32 rows = 3;
  repeated string env = 4;
  string dir = 5;
  bool record = 6;
  string record_path = 7;
}

message RunResponse {
  string session_id = 1;
  int32 pid = 2;
  string recording_path = 3;
}

// --- Kill ---

message KillRequest {
  string session_id = 1;
  int32 signal = 2;
}

message KillResponse {}

// --- Sessions ---

message SessionsRequest {
  string session_id = 1; // optional: if set, return only this session
}

message SessionsResponse {
  repeated SessionInfo sessions = 1;
}

message SessionInfo {
  string session_id = 1;
  int32 pid = 2;
  repeated string command = 3;
  uint32 cols = 4;
  uint32 rows = 5;
  bool running = 6;
  int32 exit_code = 7;
  int64 created_at = 8;
  string recording_path = 9;
}

// --- Resize ---

message ResizeRequest {
  string session_id = 1;
  uint32 cols = 2;
  uint32 rows = 3;
}

message ResizeResponse {}

// --- Exec ---

message ExecRequest {
  string session_id = 1;
  string input = 2;
  WaitCondition wait = 3;
  uint32 timeout_ms = 4;
}

message ExecResponse {
  string screen_text = 1;
  string screen_hash = 2;
  uint32 cursor_row = 3;
  uint32 cursor_col = 4;
  int64 elapsed_ms = 5;
}

// --- Screenshot ---

message ScreenshotRequest {
  string session_id = 1;
}

message ScreenshotResponse {
  string screen_text = 1;
  string screen_hash = 2;
  uint32 cursor_row = 3;
  uint32 cursor_col = 4;
  uint32 cols = 5;
  uint32 rows = 6;
}

// --- Press ---

message PressRequest {
  string session_id = 1;
  repeated string keys = 2;
  uint32 repeat = 3;
}

message PressResponse {
  string screen_text = 1;
  string screen_hash = 2;
}

// --- Type ---

message TypeRequest {
  string session_id = 1;
  string text = 2;
}

message TypeResponse {
  string screen_text = 1;
  string screen_hash = 2;
}

// --- Wait ---

message WaitCondition {
  oneof condition {
    string text = 1;
    bool stable = 2;
    string gone = 3;
    string regex = 4;
  }
}

message WaitRequest {
  string session_id = 1;
  WaitCondition condition = 2;
  uint32 timeout_ms = 3;
}

message WaitResponse {
  string screen_text = 1;
  string screen_hash = 2;
  int64 elapsed_ms = 3;
}

// --- Pipeline ---

message PipelineRequest {
  string session_id = 1;
  repeated PipelineStep steps = 2;
  bool stop_on_error = 3;
}

message PipelineStep {
  oneof step {
    ExecRequest exec = 1;
    PressRequest press = 2;
    TypeRequest type = 3;
    WaitRequest wait = 4;
    ScreenshotRequest screenshot = 5;
    SleepStep sleep = 6;
  }
}

message SleepStep {
  uint32 duration_ms = 1;
}

message PipelineResponse {
  repeated PipelineStepResult results = 1;
}

message PipelineStepResult {
  uint32 step_index = 1;
  bool success = 2;
  string error_message = 3;
  oneof result {
    ExecResponse exec = 4;
    PressResponse press = 5;
    TypeResponse type = 6;
    WaitResponse wait = 7;
    ScreenshotResponse screenshot = 8;
  }
}

// --- Watch ---

message WatchRequest {
  string session_id = 1;
}

message WatchEvent {
  WatchEventType type = 1;
  string screen_text = 2;
  string screen_hash = 3;
  int32 exit_code = 4;
}

enum WatchEventType {
  WATCH_EVENT_TYPE_UNSPECIFIED = 0;
  WATCH_EVENT_TYPE_SCREEN_CHANGED = 1;
  WATCH_EVENT_TYPE_EXITED = 2;
}

// --- Structured Error ---

message StructuredError {
  string code = 1;
  ErrorCategory category = 2;
  string message = 3;
  bool retryable = 4;
  string suggestion = 5;
  map<string, string> context = 6;
}

enum ErrorCategory {
  ERROR_CATEGORY_UNSPECIFIED = 0;
  ERROR_CATEGORY_SESSION = 1;
  ERROR_CATEGORY_TERMINAL = 2;
  ERROR_CATEGORY_TIMEOUT = 3;
  ERROR_CATEGORY_VALIDATION = 4;
  ERROR_CATEGORY_DAEMON = 5;
}
